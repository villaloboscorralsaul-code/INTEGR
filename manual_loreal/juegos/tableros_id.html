<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Identifica Componentes del Tablero</title>
<link rel="stylesheet" href="../css/style.css">
<style>
body { overflow-x: hidden; }
.game-layout { display: grid; grid-template-columns: 1fr 300px; gap: 12px; padding: 12px; height: calc(100vh - 64px); }
.panel-area { position: relative; background: #111; border-radius: 10px; overflow: hidden; }

/* Mode Toggle */
.mode-toggle { display: flex; gap: 8px; padding: 8px 12px; background: #1A1A1A; border-bottom: 1px solid #333; }
.mode-btn { flex: 1; padding: 8px; font-size: 0.85rem; font-weight: 700; }
.mode-btn.active { background: #C9A84C; color: #000; border-color: #C9A84C; }

/* Electrical Panel SVG */
.panel-container { position: relative; padding: 10px; overflow: auto; height: calc(100% - 48px); }
.panel-svg-wrapper { position: relative; display: inline-block; margin: 0 auto; display: flex; justify-content: center; }
#panel-svg { width: 100%; max-width: 640px; cursor: pointer; }

/* Hotspot buttons overlay */
.hotspot {
  position: absolute; border-radius: 50%;
  width: 28px; height: 28px; cursor: pointer;
  border: 2px solid #C9A84C;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; color: #C9A84C;
  background: rgba(0,0,0,0.7);
  transform: translate(-50%, -50%);
  transition: all 0.2s; z-index: 10;
}
.hotspot:hover { background: rgba(201,168,76,0.3); transform: translate(-50%,-50%) scale(1.2); }
.hotspot.answered-correct { border-color: #4CAF50; color: #4CAF50; background: rgba(76,175,80,0.2); }
.hotspot.answered-wrong { border-color: #F44336; color: #F44336; background: rgba(244,67,54,0.15); }
.hotspot.learn-mode { border-color: #2196F3; color: #2196F3; background: rgba(33,150,243,0.15); }

/* Tooltip */
.tooltip-popup {
  position: absolute; background: #1A1A2E; border: 1px solid #C9A84C;
  border-radius: 8px; padding: 10px 14px; z-index: 100;
  min-width: 200px; max-width: 260px; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  font-size: 0.82rem; line-height: 1.5;
}
.tooltip-popup h4 { color: #C9A84C; margin-bottom: 4px; font-size: 0.9rem; }

/* Quiz modal */
.quiz-modal {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: #1A1A2E; border: 2px solid #C9A84C; border-radius: 12px;
  padding: 24px; width: 360px; z-index: 1000; box-shadow: 0 8px 40px rgba(0,0,0,0.8);
}
.modal-overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.7); z-index: 999;
}
.quiz-choice {
  background: #1E1E3A; border: 1px solid #333; border-radius: 6px;
  padding: 10px 14px; margin-bottom: 8px; cursor: pointer;
  font-size: 0.88rem; transition: all 0.2s;
}
.quiz-choice:hover { border-color: #C9A84C; background: #2A2040; }
.quiz-choice.correct { border-color: #4CAF50; background: rgba(76,175,80,0.2); }
.quiz-choice.wrong { border-color: #F44336; background: rgba(244,67,54,0.15); }

/* Right panel */
.info-panel { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding: 10px; background: #111; border-radius: 10px; }
.comp-card {
  background: #1E1E1E; border: 1px solid #333; border-radius: 8px;
  padding: 8px 10px; font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
}
.comp-card:hover { border-color: #C9A84C; }
.comp-card .comp-name { color: #E0E0E0; font-weight: 600; }
.comp-card .comp-spec { color: #888; font-size: 0.7rem; margin-top: 2px; }
.comp-card.identified { border-color: #4CAF50; }
.comp-card.identified .comp-name { color: #A5D6A7; }

.timer-bar { height: 4px; background: #333; border-radius: 2px; overflow: hidden; margin-top: 6px; }
.timer-fill { height: 100%; background: #C9A84C; border-radius: 2px; transition: width 1s linear; }
</style>
</head>

    spec:'Indicación visual de estado (ON/OFF/Falla)',
    choices:['Luz Piloto','Pulsador de Emergencia','Selector de Voltaje','Lámpara de Trabajo'],
    correct:0, info:'La luz piloto indica el estado del equipo. Rojo=funcionando/energizado, Verde=listo/parado, Ámbar=falla o alarma.' },
  { id:14, name:'Pulsador de Marcha', icon:'🟢', hotspot:{x:'74%',y:'33%'},
    spec:'NO (Normalmente Abierto), arranque del motor',
    choices:['Pulsador de Marcha','Interruptor de Emergencia','Selector de Modo','Pulsador de Paro'],
    correct:0, info:'El pulsador de marcha (verde, NO) envía señal momentánea para arrancar el motor. Se usa junto al pulsador de paro.' },
  { id:15, name:'Bloqueo de Puerta', icon:'🔒', hotspot:{x:'80%',y:'37%'},
    spec:'Interbloqueo mecánico-eléctrico',
    choices:['Bloqueo de Puerta (Interlock)','Selector de Llave','Manija de Tierra','Cerradura de Seguridad'],
    correct:0, info:'El bloqueo de puerta (door interlock) impide abrir el tablero mientras esté energizado, o corta la alimentación al abrir. NFPA 70E.' }
];

let mode = 'learn';
let score = 0;
let identified = new Set();
let quizTimeout = null;
let timerInterval = null;
let quizTime = 120;
let currentModalComp = null;

function setMode(m) {
  mode = m;
  document.getElementById('btn-learn').className = 'btn mode-btn ' + (m==='learn' ? 'active' : 'btn-dark');
  document.getElementById('btn-quiz').className = 'btn mode-btn ' + (m==='quiz' ? 'active' : 'btn-dark');
  document.getElementById('quiz-timer').style.display = m==='quiz' ? 'inline' : 'none';
  if (m === 'quiz') {
    identified.clear();
    score = 0;
    document.getElementById('score').textContent = 0;
    startQuizTimer();
  } else {
    if (timerInterval) clearInterval(timerInterval);
    document.getElementById('timer-fill').style.width = '100%';
  }
  renderHotspots();
  renderComponentList();
}

function startQuizTimer() {
  quizTime = 120;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    quizTime--;
    const m = Math.floor(quizTime/60), s = quizTime%60;
    document.getElementById('quiz-timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    document.getElementById('timer-fill').style.width = `${(quizTime/120)*100}%`;
    if (quizTime <= 0) {
      clearInterval(timerInterval);
      document.getElementById('info-display').textContent = `⏰ Tiempo terminado. Puntaje final: ${score}`;
    }
  }, 1000);
}

function renderHotspots() {
  const container = document.getElementById('hotspots-container');
  container.style.pointerEvents = 'all';
  container.innerHTML = COMPONENTS.map(comp => {
    let cls = 'hotspot';
    if (mode === 'learn') cls += ' learn-mode';
    else if (identified.has(comp.id)) {
      cls += identified.get ? '' : ' answered-correct';
    }
    return `
      <div class="${cls}" style="left:${comp.hotspot.x};top:${comp.hotspot.y};"
        onclick="handleHotspotClick(${comp.id})"
        onmouseenter="showTooltip(event,${comp.id})"
        onmouseleave="hideTooltip()">
        ${comp.id}
      </div>
    `;
  }).join('');
}

function handleHotspotClick(compId) {
  const comp = COMPONENTS.find(c => c.id === compId);
  if (!comp) return;

  if (mode === 'learn') {
    document.getElementById('info-display').innerHTML = `
      <strong style="color:#C9A84C;font-size:1rem;">${comp.icon} ${comp.name}</strong><br>
      <span style="color:#888;font-size:0.75rem;">${comp.spec}</span><br><br>
      ${comp.info}
    `;
  } else {
    openQuizModal(comp);
  }
}

function showTooltip(e, compId) {
  if (mode !== 'learn') return;
  const comp = COMPONENTS.find(c => c.id === compId);
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `<h4>${comp.icon} ${comp.name}</h4><div style="color:#888;">${comp.spec}</div>`;
  tt.style.display = 'block';
  const rect = e.target.getBoundingClientRect();
  tt.style.left = (rect.right + 10) + 'px';
  tt.style.top = (rect.top - 10) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function openQuizModal(comp) {
  currentModalComp = comp;
  document.getElementById('modal-overlay').style.display = 'block';
  document.getElementById('quiz-modal').style.display = 'block';
  document.getElementById('modal-image').textContent = comp.icon;
  document.getElementById('modal-question').textContent = `Componente #${comp.id}: ¿Qué es este elemento?`;
  document.getElementById('modal-feedback').style.display = 'none';
  document.getElementById('modal-close-btn').style.display = 'none';

  // Shuffle choices
  const shuffled = [...comp.choices].map((c,i) => ({text:c, origIdx:i})).sort(() => Math.random()-0.5);
  const correctText = comp.choices[comp.correct];

  document.getElementById('modal-choices').innerHTML = shuffled.map(ch => `
    <div class="quiz-choice" onclick="answerModal('${ch.text}','${correctText}',this)">${ch.text}</div>
  `).join('');
}

function answerModal(chosen, correct, el) {
  if (el.classList.contains('correct') || el.classList.contains('wrong')) return;
  const isCorrect = chosen === correct;

  document.querySelectorAll('.quiz-choice').forEach(ch => {
    ch.onclick = null;
    if (ch.textContent === correct) ch.classList.add('correct');
    else if (ch === el && !isCorrect) ch.classList.add('wrong');
  });

  const fb = document.getElementById('modal-feedback');
  fb.style.display = 'block';

  if (isCorrect) {
    const pts = Math.max(10, Math.floor(quizTime/3));
    score += pts;
    identified.add(currentModalComp.id);
    document.getElementById('score').textContent = score;
    document.getElementById('identified-count').textContent = identified.size;
    fb.className = 'feedback-correct';
    fb.innerHTML = `✅ ¡Correcto! +${pts} pts.<br><small>${currentModalComp.info}</small>`;
    updateHotspot(currentModalComp.id, true);
  } else {
    fb.className = 'feedback-wrong';
    fb.innerHTML = `❌ Incorrecto. Era: <strong>${correct}</strong><br><small>${currentModalComp.info}</small>`;
    updateHotspot(currentModalComp.id, false);
  }

  document.getElementById('modal-close-btn').style.display = 'block';
  renderComponentList();

  if (identified.size === COMPONENTS.length) {
    setTimeout(() => { alert(`🏆 ¡Completaste todos los componentes! Puntaje: ${score}`); }, 500);
  }
}

function updateHotspot(compId, correct) {
  const spots = document.querySelectorAll('.hotspot');
  spots.forEach(s => {
    if (s.textContent == compId) {
      s.classList.remove('learn-mode');
      s.classList.add(correct ? 'answered-correct' : 'answered-wrong');
    }
  });
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('quiz-modal').style.display = 'none';
}

function renderComponentList() {
  const list = document.getElementById('component-list');
  list.innerHTML = COMPONENTS.map(c => `
    <div class="comp-card ${identified.has(c.id) ? 'identified' : ''}" onclick="handleHotspotClick(${c.id})">
      <div class="comp-name">${identified.has(c.id) ? '✅' : `#${c.id}`} ${c.icon} ${c.name}</div>
      <div class="comp-spec">${c.spec}</div>
    </div>
  `).join('');
}

// Initialize
renderHotspots();
renderComponentList();
</script>
</body>
</html>
